<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 340" fill="none">
  <!-- Shadow -->
  <ellipse cx="120" cy="328" rx="65" ry="10" fill="rgba(0,0,0,0.3)"/>

  <!-- Tube body -->
  <rect x="45" y="70" width="150" height="230" rx="20" fill="url(#bodyGrad)"/>

  <!-- Tube cap -->
  <rect x="58" y="32" width="124" height="46" rx="12" fill="url(#capGrad)"/>

  <!-- Nozzle -->
  <rect x="88" y="8" width="64" height="28" rx="8" fill="url(#nozzleGrad)"/>
  <rect x="103" y="2" width="34" height="10" rx="5" fill="#ffcc19"/>

  <!-- Shine on cap -->
  <rect x="66" y="38" width="12" height="30" rx="6" fill="rgba(255,255,255,0.3)"/>

  <!-- Label area -->
  <rect x="50" y="88" width="140" height="190" rx="10" fill="url(#labelGrad)"/>

  <!-- Top gold banner -->
  <rect x="50" y="88" width="140" height="36" rx="0" fill="#b7064d"/>
  <rect x="50" y="88" width="140" height="36" rx="10" fill="#b7064d"/>
  <rect x="50" y="105" width="140" height="19" fill="#b7064d"/>

  <!-- DEPANTEN text on banner -->
  <text x="120" y="112" text-anchor="middle"
    font-family="Georgia, serif" font-size="19" font-weight="bold"
    fill="#ffcc19" letter-spacing="3">DEPANTEN</text>

  <!-- Subtitle -->
  <text x="120" y="140" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="9.5" fill="rgba(255,255,255,0.9)"
    letter-spacing="1.5">CREMA ARTICOLAZIONI</text>

  <!-- Divider -->
  <line x1="68" y1="150" x2="172" y2="150" stroke="rgba(255,204,25,0.5)" stroke-width="1"/>

  <!-- Leaf decoration -->
  <g transform="translate(120,172)">
    <ellipse cx="-18" cy="0" rx="14" ry="7" fill="#1a7a3a" transform="rotate(-25 -18 0)" opacity="0.9"/>
    <ellipse cx="18" cy="0" rx="14" ry="7" fill="#1a7a3a" transform="rotate(25 18 0)" opacity="0.9"/>
    <ellipse cx="-10" cy="-4" rx="10" ry="5" fill="#2daa52" transform="rotate(-20 -10 -4)"/>
    <ellipse cx="10" cy="-4" rx="10" ry="5" fill="#2daa52" transform="rotate(20 10 -4)"/>
    <line x1="0" y1="-12" x2="0" y2="14" stroke="#1a7a3a" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="2" x2="-8" y2="-5" stroke="#1a7a3a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="2" x2="8" y2="-5" stroke="#1a7a3a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Stars -->
  <text x="120" y="200" text-anchor="middle" font-size="11" fill="#ffcc19" letter-spacing="3">★ ★ ★ ★ ★</text>

  <!-- 100% Naturale badge -->
  <rect x="75" y="208" width="90" height="20" rx="10" fill="rgba(45,154,80,0.25)" stroke="#2daa52" stroke-width="1"/>
  <text x="120" y="222" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="8.5" fill="#4dff91"
    letter-spacing="1">100% NATURALE</text>

  <!-- Volume -->
  <text x="120" y="252" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)"
    letter-spacing="2">75 ml</text>

  <!-- Italy flag stripe at bottom -->
  <rect x="50" y="268" width="47" height="22" fill="#009246" rx="0"/>
  <rect x="97" y="268" width="46" height="22" fill="#ffffff"/>
  <rect x="143" y="268" width="47" height="22" fill="#ce2b37"/>
  <rect x="50" y="278" width="140" height="12" rx="0" fill="none"/>
  <!-- rounded corners for bottom stripe -->
  <rect x="50" y="268" width="140" height="22" rx="0" fill="none"/>
  <path d="M50,268 h140 v12 q0,10 -10,10 h-120 q-10,0 -10,-10 z" fill="none"/>

  <!-- Left highlight -->
  <rect x="50" y="75" width="18" height="218" rx="9" fill="rgba(255,255,255,0.07)"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a0a1a"/>
      <stop offset="25%" stop-color="#4d1a3c"/>
      <stop offset="60%" stop-color="#3d1530"/>
      <stop offset="100%" stop-color="#1e0814"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a0438"/>
      <stop offset="40%" stop-color="#d4085a"/>
      <stop offset="70%" stop-color="#c0064e"/>
      <stop offset="100%" stop-color="#7a0330"/>
    </linearGradient>
    <linearGradient id="nozzleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0085e"/>
      <stop offset="100%" stop-color="#9a0545"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d1530"/>
      <stop offset="50%" stop-color="#2a0f1e"/>
      <stop offset="100%" stop-color="#1e0814"/>
    </linearGradient>
  </defs>
</svg>
